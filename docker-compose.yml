version: '3.8'

services:
  quant-trading:
    # Docker Hub에서 받아서 실행 (기본)
    image: akito56/quant-trading-dashboard:latest
    # 로컬에서 빌드해서 쓰려면 아래 주석 해제하고 위 image 줄 주석 처리
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: quant-trading-dashboard
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      # 토큰 저장 경로 (config를 :ro로 마운트해도 여기에 쓰기 가능)
      - KIS_TOKEN_ROOT=/app/data/token
      # DynamoDB 설정 (환경변수로 오버라이드 가능)
      - USE_DYNAMODB=${USE_DYNAMODB:-true}
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-quant_trading_users}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      
      # KIS API 설정 (필요시)
      # - KIS_APP_KEY=${KIS_APP_KEY}
      # - KIS_APP_SECRET=${KIS_APP_SECRET}
      
      # Python 설정
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/domestic_stock
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - quant-trading-network

networks:
  quant-trading-network:
    driver: bridge
