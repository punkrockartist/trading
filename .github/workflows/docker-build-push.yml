name: Build and Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "::error::DOCKERHUB_USERNAME is not set. Add it in Settings > Secrets and variables > Actions."; exit 1; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "::error::DOCKERHUB_TOKEN is not set. Add it in Settings > Secrets and variables > Actions."; exit 1; fi
          echo "Docker Hub secrets are set."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: https://index.docker.io/v1/
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            akito56/quant-trading-dashboard:latest
            akito56/quant-trading-dashboard:${{ github.sha }}
          cache-from: type=registry,ref=akito56/quant-trading-dashboard:buildcache
          cache-to: type=registry,ref=akito56/quant-trading-dashboard:buildcache,mode=max
